<!DOCTYPE html>
<html>

<head>
    <title>Responsive Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            display: flex;
            background: #f4f6f9;
        }

        /* Sidebar */
        .sidebar {
            width: 250px;
            height: 100vh;
            background: #2c3e50;
            color: white;
            position: fixed;
            left: 0;
            top: 0;
            padding-top: 20px;
            transition: 0.3s;
        }

        .sidebar h2 {
            text-align: center;
            margin-bottom: 30px;
        }

        .sidebar a {
            display: block;
            color: white;
            text-decoration: none;
            padding: 15px 20px;
        }

        .sidebar a:hover {
            background: #34495e;
        }

        /* Main Content */
        .main {
            margin-left: 250px;
            width: 100%;
            padding: 20px;
        }

        /* Navbar */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        .menu-btn {
            display: none;
            font-size: 25px;
            cursor: pointer;
        }

        /* Cards */
        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .card h3 {
            margin-bottom: 10px;
        }

        /* Table */
        .table-box {
            margin-top: 20px;
            background: white;
            padding: 20px;
            border-radius: 10px;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        table th,
        table td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: center;
        }

        th {
            background: #2c3e50;
            color: white;
        }

        /* Mobile */
        @media(max-width:768px) {

            .sidebar {
                left: -250px;
            }

            .sidebar.active {
                left: 0;
            }

            .main {
                margin-left: 0;
            }

            .menu-btn {
                display: block;
            }
        }
    </style>
</head>

<body>

    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
        <h2>Dashboard</h2>

        <a href="#">Home</a>
        <a href="#">Profile</a>
        <a href="#">Analytics</a>
        <a href="#">Messages</a>
        <a href="#">Settings</a>
        <a href="#">Logout</a>
    </div>

    <!-- Main Content -->
    <div class="main">

        <!-- Navbar -->
        <div class="navbar">

            <span class="menu-btn" onclick="toggleMenu()">☰</span>

            <h2>Welcome User</h2>

            <p>Admin</p>

        </div>

        <!-- Cards -->
        <div class="cards">

            <div class="card">
                <h3>Users</h3>
                <h1>1200</h1>
            </div>

            <div class="card">
                <h3>Orders</h3>
                <h1>560</h1>
            </div>

            <div class="card">
                <h3>Revenue</h3>
                <h1>₹75,000</h1>
            </div>

            <div class="card">
                <h3>Products</h3>
                <h1>85</h1>
            </div>

        </div>

        <!-- Table -->
        <div class="table-box">

            <h2>Recent Activity</h2>
            <br>

            <table>

                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Status</th>
                </tr>

                <tr>
                    <td>101</td>
                    <td>Sandhiya</td>
                    <td>Active</td>
                </tr>

                <tr>
                    <td>102</td>
                    <td>Santhosh</td>
                    <td>Pending</td>
                </tr>

                <tr>
                    <td>103</td>
                    <td>Kumar</td>
                    <td>Completed</td>
                </tr>

            </table>

        </div>

    </div>

    <script>

        function toggleMenu() {
            document.getElementById("sidebar")
                .classList.toggle("active");
        }

    </script>

</body>

</html>

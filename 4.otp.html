<!DOCTYPE html>
<html>

<head>
    <title>OTP Verification</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f2f2f2;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            width: 300px;
            background: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 0 10px gray;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
        }

        button {
            width: 95%;
            padding: 10px;
            background: blue;
            color: white;
            border: none;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <div class="container">

        <h2>OTP Verification</h2>

        <input type="text" id="otp" placeholder="Enter OTP">

        <button onclick="verifyOTP()">
            Verify OTP
        </button>

    </div>

    <script>

        // Sample OTP
        let generatedOTP = "7654321";

        function verifyOTP() {

            let userOTP = document.getElementById("otp").value;

            if (userOTP == generatedOTP) {
                alert("OTP Verified Successfully");
            }
            else {
                alert("Invalid OTP");
            }
        }

    </script>

</body>

</html>

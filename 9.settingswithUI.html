<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings Management</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #f2f2f2;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            transition: 0.3s;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.1);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 6px;
        }

        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        .toggle {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            opacity: 0.9;
        }

        /* Dark Mode */

        .dark {
            background: #1e1e1e;
            color: white;
        }

        .dark .container {
            background: #333;
        }

        .dark input {
            background: #444;
            color: white;
            border: 1px solid #666;
        }

        /* Responsive */

        @media(max-width:500px) {

            .container {
                padding: 20px;
            }

        }
    </style>

</head>

<body id="body">

    <div class="container">

        <h2>Settings</h2>

        <div class="form-group">
            <label>User Name</label>
            <input type="text" id="username" value="Sandhiya">
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" id="email" value="sandhiya@gmail.com">
        </div>

        <div class="form-group">
            <label>New Password</label>
            <input type="password" id="password">
        </div>

        <div class="form-group toggle">

            <label>Enable Notifications</label>

            <input type="checkbox" id="notify" checked>

        </div>

        <div class="form-group toggle">

            <label>Dark Mode</label>

            <input type="checkbox" id="darkMode" onchange="toggleDarkMode()">

        </div>

        <button onclick="saveSettings()">
            Save Settings
        </button>

    </div>

    <script>

        function saveSettings() {

            let name = document.getElementById("username").value;

            alert("Settings saved successfully!\nUser: " + name);

        }

        function toggleDarkMode() {

            document.getElementById("body")
                .classList.toggle("dark");

        }

    </script>

</body>

</html>

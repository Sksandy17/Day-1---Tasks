<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Management</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #f2f2f2;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .profile-container {
            width: 100%;
            max-width: 450px;
            background: #fff;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.1);
        }

        .profile-image {
            text-align: center;
        }

        .profile-image img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid #3498db;
        }

        .profile-image h2 {
            margin-top: 15px;
        }

        .form-group {
            margin-top: 15px;
        }

        label {
            font-weight: bold;
            display: block;
            margin-bottom: 5px;
        }

        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        .buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 5px;
            color: white;
            cursor: pointer;
        }

        .edit-btn {
            background: #3498db;
        }

        .save-btn {
            background: #28a745;
        }

        @media(max-width:500px) {

            .profile-container {
                padding: 20px;
            }

            .buttons {
                flex-direction: column;
            }

        }
    </style>
</head>

<body>

    <div class="profile-container">

        <div class="profile-image">

            <img src="https://via.placeholder.com/120" alt="Profile">

            <h2>User Profile</h2>

        </div>

        <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="name" value="Sandhiya" disabled>
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" id="email" value="sandhiya@gmail.com" disabled>
        </div>

        <div class="form-group">
            <label>Phone Number</label>
            <input type="text" id="phone" value="9876543210" disabled>
        </div>

        <div class="form-group">
            <label>Address</label>
            <input type="text" id="address" value="Tamil Nadu, India" disabled>
        </div>

        <div class="buttons">

            <button class="edit-btn" onclick="editProfile()">
                Edit Profile
            </button>

            <button class="save-btn" onclick="saveProfile()">
                Save
            </button>

        </div>

    </div>

    <script>

        function editProfile() {

            document.getElementById("name").disabled = false;
            document.getElementById("email").disabled = false;
            document.getElementById("phone").disabled = false;
            document.getElementById("address").disabled = false;

            alert("You can now edit your profile.");

        }

        function saveProfile() {

            document.getElementById("name").disabled = true;
            document.getElementById("email").disabled = true;
            document.getElementById("phone").disabled = true;
            document.getElementById("address").disabled = true;

            alert("Profile Updated Successfully!");

        }

    </script>

</body>

</html>

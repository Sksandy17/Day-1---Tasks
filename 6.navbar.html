<!DOCTYPE html>
<html>

<head>
    <title>Responsive Navigation Bar</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        nav {
            background: #333;
            padding: 15px 20px;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            color: white;
            font-size: 24px;
            font-weight: bold;
        }

        .nav-links {
            list-style: none;
            display: flex;
        }

        .nav-links li {
            margin-left: 20px;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            font-size: 18px;
        }

        .nav-links a:hover {
            color: #00bcd4;
        }

        /* Menu Icon */
        .menu-icon {
            display: none;
            color: white;
            font-size: 28px;
            cursor: pointer;
        }

        /* Responsive */
        @media(max-width:768px) {

            .menu-icon {
                display: block;
            }

            .nav-links {
                display: none;
                flex-direction: column;
                width: 100%;
                background: #333;
                position: absolute;
                top: 60px;
                left: 0;
            }

            .nav-links.active {
                display: flex;
            }

            .nav-links li {
                text-align: center;
                margin: 15px 0;
            }
        }
    </style>
</head>

<body>

    <nav>

        <div class="navbar">

            <div class="logo">MyWebsite</div>

            <div class="menu-icon" onclick="toggleMenu()">
                ☰
            </div>

            <ul class="nav-links" id="menu">

                <li><a href="#">Home</a></li>

                <li><a href="#">About</a></li>

                <li><a href="#">Services</a></li>

                <li><a href="#">Gallery</a></li>

                <li><a href="#">Contact</a></li>

            </ul>

        </div>

    </nav>

    <script>

        function toggleMenu() {
            document.getElementById("menu")
                .classList.toggle("active");
        }

    </script>

</body>

</html>

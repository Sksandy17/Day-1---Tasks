<!DOCTYPE html>
<html>

<head>
    <title>Responsive Landing Page</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
        }

        header {
            background: #333;
            color: white;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 0 10px;
        }

        .hero {
            text-align: center;
            padding: 80px 20px;
            background: #f4f4f4;
        }

        .hero h1 {
            font-size: 40px;
        }

        .hero p {
            margin: 20px 0;
        }

        .btn {
            padding: 10px 20px;
            background: #333;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }

        .features {
            display: flex;
            justify-content: space-around;
            padding: 40px 20px;
            flex-wrap: wrap;
        }

        .box {
            width: 300px;
            padding: 20px;
            margin: 10px;
            border: 1px solid #ccc;
            text-align: center;
        }

        footer {
            background: #333;
            color: white;
            text-align: center;
            padding: 15px;
        }

        /* Responsive Design */
        @media(max-width:768px) {

            header {
                flex-direction: column;
            }

            nav {
                margin-top: 10px;
            }

            .hero h1 {
                font-size: 28px;
            }

            .features {
                flex-direction: column;
                align-items: center;
            }

            .box {
                width: 90%;
            }
        }
    </style>
</head>

<body>

    <header>
        <h2>My Website</h2>

        <nav>
            <a href="#">Home</a>
            <a href="#">About</a>
            <a href="#">Services</a>
            <a href="#">Contact</a>
        </nav>
    </header>

    <section class="hero">
        <h1>Welcome to My Website</h1>
        <p>Create beautiful and responsive web pages.</p>
        <a href="#" class="btn">Get Started</a>
    </section>

    <section class="features">

        <div class="box">
            <h3>Fast</h3>
            <p>Quick and responsive design.</p>
        </div>

        <div class="box">
            <h3>Easy</h3>
            <p>Simple and easy to understand.</p>
        </div>

        <div class="box">
            <h3>Responsive</h3>
            <p>Works on mobile, tablet and desktop.</p>
        </div>

    </section>

    <footer>
        <p>© 2026 My Website. All Rights Reserved.</p>
    </footer>

</body>

</html>

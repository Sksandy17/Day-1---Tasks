<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Admin Panel</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            display: flex;
            background: #f4f6f9;
        }

        /* Sidebar */
        .sidebar {
            width: 250px;
            height: 100vh;
            background: #1e293b;
            color: white;
            position: fixed;
            left: 0;
            top: 0;
            transition: 0.3s;
        }

        .sidebar h2 {
            text-align: center;
            padding: 20px;
            border-bottom: 1px solid #444;
        }

        .sidebar a {
            display: block;
            color: white;
            text-decoration: none;
            padding: 15px 20px;
        }

        .sidebar a:hover {
            background: #334155;
        }

        /* Main Content */
        .main {
            margin-left: 250px;
            width: 100%;
            padding: 20px;
        }

        /* Navbar */
        .navbar {
            background: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .menu-btn {
            display: none;
            font-size: 28px;
            cursor: pointer;
        }

        /* Cards */
        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .card h3 {
            margin-bottom: 10px;
        }

        /* Table */
        .table-box {
            margin-top: 20px;
            background: white;
            padding: 20px;
            border-radius: 10px;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th,
        td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: center;
        }

        th {
            background: #1e293b;
            color: white;
        }

        /* Responsive */
        @media(max-width:768px) {

            .sidebar {
                left: -250px;
            }

            .sidebar.active {
                left: 0;
            }

            .main {
                margin-left: 0;
            }

            .menu-btn {
                display: block;
            }
        }
    </style>
</head>

<body>

    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">

        <h2>Admin Panel</h2>

        <a href="#">Dashboard</a>
        <a href="#">Users</a>
        <a href="#">Orders</a>
        <a href="#">Products</a>
        <a href="#">Reports</a>
        <a href="#">Settings</a>
        <a href="#">Logout</a>

    </div>

    <!-- Main -->
    <div class="main">

        <!-- Navbar -->
        <div class="navbar">

            <span class="menu-btn" onclick="toggleMenu()">☰</span>

            <h2>Dashboard</h2>

            <h4>Admin</h4>

        </div>

        <!-- Cards -->
        <div class="cards">

            <div class="card">
                <h3>Total Users</h3>
                <h1>1,250</h1>
            </div>

            <div class="card">
                <h3>Total Orders</h3>
                <h1>560</h1>
            </div>

            <div class="card">
                <h3>Revenue</h3>
                <h1>₹1,25,000</h1>
            </div>

            <div class="card">
                <h3>Products</h3>
                <h1>85</h1>
            </div>

        </div>

        <!-- User Table -->
        <div class="table-box">

            <h2>User Management</h2>
            <br>

            <table>

                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Status</th>
                </tr>

                <tr>
                    <td>101</td>
                    <td>John</td>
                    <td>john@gmail.com</td>
                    <td>Active</td>
                </tr>

                <tr>
                    <td>102</td>
                    <td>Mary</td>
                    <td>mary@gmail.com</td>
                    <td>Inactive</td>
                </tr>

                <tr>
                    <td>103</td>
                    <td>David</td>
                    <td>david@gmail.com</td>
                    <td>Active</td>
                </tr>

            </table>

        </div>

    </div>

    <script>

        function toggleMenu() {
            document.getElementById("sidebar")
                .classList.toggle("active");
        }

    </script>

</body>

</html>
